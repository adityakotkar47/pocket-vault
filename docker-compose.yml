services:
  postgres:
    image: postgres:18-alpine
    container_name: pocket-vault-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pocketvault
      POSTGRES_PASSWORD: pocketvault
      POSTGRES_DB: pocketvault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
